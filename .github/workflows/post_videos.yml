name: Post Pip Videos Daily
on:
  schedule:
    - cron: '30 19 * * *'  # 7:30 PM daily (UTC) — content is generated at 12:00 PM
  # Manual trigger:
  workflow_dispatch:

concurrency:
  group: pip-content
  cancel-in-progress: false

jobs:
  postContent:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v5
        with:
          persist-credentials: false  # we'll use token manually if needed
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      - name: Post video to socials
        env:
          YOUTUBE_API_CLIENT_ID: ${{ secrets.YOUTUBE_API_CLIENT_ID }}
          YOUTUBE_API_CLIENT_SECRET: ${{ secrets.YOUTUBE_API_CLIENT_SECRET }}
          YOUTUBE_API_REFRESH_TOKEN: ${{ secrets.YOUTUBE_API_REFRESH_TOKEN }}
          FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}
          IG_PAGE_ID: ${{ secrets.IG_PAGE_ID }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          TIKTOK_ACCESS_TOKEN: ${{ secrets.TIKTOK_ACCESS_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
        run: |
          python post_script.py
      # Runs even if posting partially failed: post_script.py records which
      # platforms succeeded in video_info.json so the next run only retries
      # the failed ones — that state must be committed either way.
      - name: Commit posting state / video deletion
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

          # Configure Git to use the token for authentication
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git

          git add -A
          # Only commit if there are changes
          if ! git diff --staged --quiet; then
            git commit -m "Update posting state / archive posted videos [automated]"

            # Pull any remote changes before pushing to avoid conflicts
            git pull --rebase origin main || echo "No remote changes to pull"

            # Push the changes
            git push
          else
            echo "No changes to commit"
          fi
